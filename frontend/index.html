<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYC Extraction Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #ffffff;
    --off-white: #f7f6f3;
    --border: #e4e2dc;
    --border-strong: #c8c5bc;
    --text-primary: #1a1916;
    --text-secondary: #6b6860;
    --text-muted: #9c9a94;
    --accent: #1a1916;
    --success-bg: #eaf3de;
    --success-text: #27500a;
    --success-border: #c0dd97;
    --warn-bg: #faeeda;
    --warn-text: #633806;
    --warn-border: #fac775;
    --error-bg: #fcebeb;
    --error-text: #791f1f;
    --error-border: #f7c1c1;
    --info-bg: #e6f1fb;
    --info-text: #0c447c;
    --info-border: #b5d4f4;
    --pending-bg: #eeedfe;
    --pending-text: #3c3489;
    --pending-border: #afa9ec;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--off-white);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 18px;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  .logo span {
    font-style: italic;
    color: var(--text-secondary);
  }

  .badge-offline {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--success-bg);
    color: var(--success-text);
    border: 1px solid var(--success-border);
    padding: 3px 8px;
    border-radius: 4px;
  }

  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 3rem 1.5rem;
  }

  .page-title {
    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    letter-spacing: -0.02em;
    line-height: 1.2;
    color: var(--text-primary);
    margin-bottom: 0.4rem;
  }

  .page-subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 300;
    margin-bottom: 2.5rem;
  }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 1rem;
  }

  .drop-zone {
    border: 1.5px dashed var(--border-strong);
    border-radius: 8px;
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--text-primary);
    background: var(--off-white);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    width: 36px;
    height: 36px;
    margin: 0 auto 12px;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--off-white);
  }

  .drop-icon svg { width: 16px; height: 16px; stroke: var(--text-secondary); }

  .drop-text {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 400;
  }

  .drop-text strong {
    color: var(--text-primary);
    font-weight: 500;
  }

  .drop-hint {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .file-selected {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--off-white);
    border-radius: 6px;
    margin-top: 12px;
  }

  .file-selected.show { display: flex; }

  .file-icon {
    width: 28px;
    height: 28px;
    background: var(--pending-bg);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .file-icon svg { width: 14px; height: 14px; stroke: var(--pending-text); }

  .file-name {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .file-size {
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .doc-types {
    display: flex;
    gap: 8px;
    margin-top: 1rem;
  }

  .doc-type-btn {
    flex: 1;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    cursor: pointer;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-secondary);
    transition: all 0.12s;
    text-align: center;
  }

  .doc-type-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
  .doc-type-btn.active {
    border-color: var(--text-primary);
    background: var(--text-primary);
    color: var(--white);
  }

  .doc-type-label {
    font-weight: 500;
    display: block;
    margin-bottom: 1px;
  }

  .doc-type-hint {
    font-size: 10px;
    opacity: 0.7;
  }

  .submit-btn {
    width: 100%;
    padding: 11px;
    background: var(--text-primary);
    color: var(--white);
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 1rem;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .submit-btn:hover { opacity: 0.85; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .status-card { display: none; }
  .status-card.show { display: block; }

  .status-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .status-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
  }

  .badge-pending { background: var(--pending-bg); color: var(--pending-text); border: 1px solid var(--pending-border); }
  .badge-processing { background: var(--info-bg); color: var(--info-text); border: 1px solid var(--info-border); }
  .badge-completed { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
  .badge-failed { background: var(--error-bg); color: var(--error-text); border: 1px solid var(--error-border); }

  .job-id-mono {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 1.25rem;
  }

  .progress-bar {
    height: 100%;
    background: var(--text-primary);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-bar.indeterminate {
    width: 40%;
    animation: slide 1.2s ease-in-out infinite;
  }

  @keyframes slide {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(280%); }
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 1rem;
  }

  .result-field {
    background: var(--off-white);
    border-radius: 6px;
    padding: 10px 12px;
  }

  .result-field-label {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 3px;
  }

  .result-field-value {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .confidence-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-top: 1px solid var(--border);
  }

  .confidence-label {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .confidence-value {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
  }

  .confidence-high { color: var(--success-text); }
  .confidence-mid { color: var(--warn-text); }
  .confidence-low { color: var(--error-text); }

  .validation-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-secondary);
  }

  .val-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .val-pass { background: #639922; }
  .val-fail { background: #e24b4a; }

  .error-box {
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 13px;
    color: var(--error-text);
    font-family: 'DM Mono', monospace;
  }

  .poll-note {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    margin-top: 8px;
  }

  .reset-btn {
    width: 100%;
    padding: 9px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    margin-top: 1rem;
    transition: all 0.12s;
  }

  .reset-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }

  footer {
    text-align: center;
    padding: 2rem;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<header>
  <div class="logo">KYC <span>Extraction</span></div>
  <div class="badge-offline">● Offline</div>
</header>

<main>
  <h1 class="page-title">Document<br>Extraction</h1>
  <p class="page-subtitle">Aadhaar · PAN · Passport &nbsp;—&nbsp; zero cloud dependency</p>

  <div class="card" id="upload-card">
    <div class="card-label">Upload document</div>

    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.pdf" />
      <div class="drop-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <p class="drop-text"><strong>Choose file</strong> or drag here</p>
      <p class="drop-hint">JPG, PNG, PDF · max 8MB</p>
    </div>

    <div class="file-selected" id="file-selected">
      <div class="file-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
      </div>
      <span class="file-name" id="file-name-display">—</span>
      <span class="file-size" id="file-size-display">—</span>
    </div>

    <div class="doc-types" id="doc-types">
      <button class="doc-type-btn active" data-type="auto">
        <span class="doc-type-label">Auto</span>
        <span class="doc-type-hint">detect type</span>
      </button>
      <button class="doc-type-btn" data-type="aadhaar">
        <span class="doc-type-label">Aadhaar</span>
        <span class="doc-type-hint">12-digit UID</span>
      </button>
      <button class="doc-type-btn" data-type="pan">
        <span class="doc-type-label">PAN</span>
        <span class="doc-type-hint">10-char</span>
      </button>
      <button class="doc-type-btn" data-type="passport">
        <span class="doc-type-label">Passport</span>
        <span class="doc-type-hint">MRZ</span>
      </button>
    </div>

    <button class="submit-btn" id="submit-btn" disabled>
      <div class="spinner" id="spinner"></div>
      <span id="submit-label">Select a file to begin</span>
    </button>
  </div>

  <div class="card status-card" id="status-card">
    <div class="status-header">
      <div class="card-label" style="margin:0">Extraction result</div>
      <span class="status-badge badge-pending" id="status-badge">pending</span>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar indeterminate" id="progress-bar"></div>
    </div>

    <div id="job-id-row" style="margin-bottom: 1rem;">
      <span class="job-id-mono" id="job-id-display">—</span>
    </div>

    <div id="result-body"></div>

    <p class="poll-note" id="poll-note">Polling every 2s…</p>

    <button class="reset-btn" id="reset-btn">Process another document</button>
  </div>
</main>

<footer>self-hosted · open-cv · tesseract · spacy</footer>

<script>
const API_BASE = 'http://127.0.0.1:8000';
let pollTimer = null;
let selectedFile = null;

const fileInput = document.getElementById('file-input');
const dropZone = document.getElementById('drop-zone');
const fileSelected = document.getElementById('file-selected');
const fileNameDisplay = document.getElementById('file-name-display');
const fileSizeDisplay = document.getElementById('file-size-display');
const submitBtn = document.getElementById('submit-btn');
const submitLabel = document.getElementById('submit-label');
const spinner = document.getElementById('spinner');
const uploadCard = document.getElementById('upload-card');
const statusCard = document.getElementById('status-card');
const statusBadge = document.getElementById('status-badge');
const progressBar = document.getElementById('progress-bar');
const jobIdDisplay = document.getElementById('job-id-display');
const resultBody = document.getElementById('result-body');
const pollNote = document.getElementById('poll-note');
const resetBtn = document.getElementById('reset-btn');

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function setFile(file) {
  selectedFile = file;
  fileNameDisplay.textContent = file.name;
  fileSizeDisplay.textContent = formatBytes(file.size);
  fileSelected.classList.add('show');
  submitBtn.disabled = false;
  submitLabel.textContent = 'Extract fields';
}

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) setFile(e.target.files[0]);
});

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
});

document.querySelectorAll('.doc-type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.doc-type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

submitBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  submitBtn.disabled = true;
  spinner.style.display = 'block';
  submitLabel.textContent = 'Uploading…';

  const formData = new FormData();
  formData.append('file', selectedFile);

  try {
    const res = await fetch(`${API_BASE}/upload`, { method: 'POST', body: formData });
    if (!res.ok) throw new Error(`Upload failed: ${res.status}`);
    const data = await res.json();
    showStatusCard(data.job_id);
  } catch (err) {
    submitBtn.disabled = false;
    spinner.style.display = 'none';
    submitLabel.textContent = 'Upload failed — try again';
  }
});

function showStatusCard(jobId) {
  uploadCard.style.display = 'none';
  statusCard.classList.add('show');
  jobIdDisplay.textContent = jobId;
  startPolling(jobId);
}

function startPolling(jobId) {
  pollTimer = setInterval(() => pollStatus(jobId), 2000);
  pollStatus(jobId);
}

async function pollStatus(jobId) {
  try {
    const res = await fetch(`${API_BASE}/status/${jobId}`);
    if (!res.ok) return;
    const data = await res.json();
    updateStatusUI(data);
    if (data.status === 'completed' || data.status === 'failed') {
      clearInterval(pollTimer);
      pollNote.textContent = 'Processing complete.';
    }
  } catch (e) {}
}

function updateStatusUI(data) {
  const status = data.status;

  statusBadge.className = 'status-badge';
  statusBadge.classList.add(`badge-${status}`);
  statusBadge.textContent = status;

  progressBar.classList.remove('indeterminate');
  if (status === 'pending') {
    progressBar.classList.add('indeterminate');
  } else if (status === 'processing') {
    progressBar.classList.add('indeterminate');
  } else if (status === 'completed') {
    progressBar.style.width = '100%';
  } else if (status === 'failed') {
    progressBar.style.width = '100%';
    progressBar.style.background = '#e24b4a';
  }

  if (status === 'completed' && data.fields) {
    renderResult(data);
  } else if (status === 'failed') {
    resultBody.innerHTML = `<div class="error-box">${data.error || 'Extraction failed'}</div>`;
  }
}

function renderResult(data) {
  const fields = data.fields || {};
  const validation = data.validation || {};
  const confidence = data.overall_confidence;
  const docType = data.document_type || 'unknown';

  let fieldsHTML = '';
  const fieldEntries = Object.entries(fields);
  if (fieldEntries.length === 0) {
    fieldsHTML = `<p style="font-size:13px;color:var(--text-muted);margin-bottom:1rem;">No fields extracted.</p>`;
  } else {
    fieldsHTML = `<div class="result-grid">`;
    fieldEntries.forEach(([key, val]) => {
      const display = (val && val.value !== undefined) ? val.value : (typeof val === 'string' ? val : JSON.stringify(val));
      const label = key.replace(/_/g, ' ');
      fieldsHTML += `
        <div class="result-field">
          <div class="result-field-label">${label}</div>
          <div class="result-field-value">${display || '—'}</div>
        </div>`;
    });
    fieldsHTML += `</div>`;
  }

  let confClass = 'confidence-high';
  if (confidence < 0.75) confClass = 'confidence-low';
  else if (confidence < 0.9) confClass = 'confidence-mid';

  const confHTML = confidence != null ? `
    <div class="confidence-row">
      <span class="confidence-label">Overall confidence</span>
      <span class="confidence-value ${confClass}">${(confidence * 100).toFixed(1)}%</span>
    </div>` : '';

  let valHTML = '';
  const valEntries = Object.entries(validation);
  if (valEntries.length > 0) {
    valEntries.forEach(([key, val]) => {
      const pass = val === true || val === 'valid' || val === 'pass';
      const label = key.replace(/_/g, ' ');
      valHTML += `
        <div class="validation-row">
          <div class="val-dot ${pass ? 'val-pass' : 'val-fail'}"></div>
          ${label}
          <span style="margin-left:auto;font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted)">${pass ? 'pass' : 'fail'}</span>
        </div>`;
    });
  }

  const docBadge = `<span style="font-family:'DM Mono',monospace;font-size:10px;background:var(--info-bg);color:var(--info-text);border:1px solid var(--info-border);padding:2px 7px;border-radius:4px;letter-spacing:0.06em;text-transform:uppercase;">${docType}</span>`;

  resultBody.innerHTML = `
    <div style="margin-bottom:1rem;">${docBadge}</div>
    ${fieldsHTML}
    ${confHTML}
    ${valHTML}
  `;
}

resetBtn.addEventListener('click', () => {
  clearInterval(pollTimer);
  selectedFile = null;
  fileInput.value = '';
  fileSelected.classList.remove('show');
  submitBtn.disabled = true;
  submitLabel.textContent = 'Select a file to begin';
  spinner.style.display = 'none';
  progressBar.style.width = '0%';
  progressBar.style.background = 'var(--text-primary)';
  progressBar.classList.remove('indeterminate');
  resultBody.innerHTML = '';
  pollNote.textContent = 'Polling every 2s…';
  statusBadge.className = 'status-badge badge-pending';
  statusBadge.textContent = 'pending';
  jobIdDisplay.textContent = '—';
  uploadCard.style.display = 'block';
  statusCard.classList.remove('show');
  document.querySelectorAll('.doc-type-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.doc-type-btn[data-type="auto"]').classList.add('active');
});
</script>
</body>
</html>
